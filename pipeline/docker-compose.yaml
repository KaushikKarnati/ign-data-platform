# ign-data-platform/pipeline/docker-compose.yaml
#
# Airflow stack optimised for a t3.small EC2 instance (2GB RAM).
# Uses LocalExecutor — the scheduler runs tasks directly, no Celery or Redis needed.
# This is perfectly suitable for a single DAG running daily.
#
# Services:
#   postgres          — Airflow metadata database (task states, DAG runs, logs)
#   airflow-init      — One-time init: DB migration + admin user creation
#   airflow-webserver — UI on port 8080
#   airflow-scheduler — Parses DAGs, triggers tasks, AND executes them (LocalExecutor)
#
# Usage:
#   docker compose up -d              # Start all services
#   docker compose down               # Stop all services
#   docker compose logs -f scheduler  # Tail scheduler/task logs

---
x-airflow-common: &airflow-common
  build: .
  env_file:
    - .env
  environment: &airflow-common-env
    # --- Airflow core ---
    AIRFLOW__CORE__EXECUTOR:                    LocalExecutor
    AIRFLOW__CORE__FERNET_KEY:                  ${FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES:               "false"

    # --- Database (Airflow metadata) ---
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
      postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow

    # --- API auth ---
    AIRFLOW__API__AUTH_BACKENDS: >-
      airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session

    # --- Scheduler health ---
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"

    # --- Airflow Variables (injected from .env) ---
    AIRFLOW_VAR_YT_API_KEY:        ${YT_API_KEY}
    AIRFLOW_VAR_YT_CHANNEL_HANDLE: ${YT_CHANNEL_HANDLE}
    AIRFLOW_VAR_S3_BUCKET:         ${S3_BUCKET}
    AIRFLOW_VAR_S3_KEY:            ${S3_KEY}
    AIRFLOW_VAR_AWS_REGION:        ${AWS_REGION}
    AIRFLOW_VAR_GLUE_CRAWLER_NAME: ${GLUE_CRAWLER_NAME}

    # --- AWS credentials (used by boto3 in tasks) ---
    AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    AWS_DEFAULT_REGION:    ${AWS_REGION}

  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins

  user: "${AIRFLOW_UID:-50000}:0"
  dns:
    - 8.8.8.8
    - 8.8.4.4

  depends_on: &airflow-depends-on
    postgres:
      condition: service_healthy

# ---------------------------------------------------------------------------
services:

  postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test:         ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "airflow"]
      interval:     10s
      retries:      5
      start_period: 5s
    restart: always

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER} \
          --password ${AIRFLOW_ADMIN_PASSWORD} \
          --firstname Ram \
          --lastname K \
          --role Admin \
          --email ${AIRFLOW_ADMIN_EMAIL}
        echo "Airflow initialised successfully."
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE:      "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
    user: "0:0"
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "80:8080"
    healthcheck:
      test:         ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval:     30s
      timeout:      10s
      retries:      5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    healthcheck:
      test:         ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval:     30s
      timeout:      10s
      retries:      5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-depends-on
      airflow-init:
        condition: service_completed_successfully

# ---------------------------------------------------------------------------
volumes:
  postgres-db-volume: